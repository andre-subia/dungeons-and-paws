<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0e0a08" />
    <title>Dungeon and Paws</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
    />
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        height: 100%;
        height: 100dvh;
        background: #0e0a08;
        color: #f0e6d0;
        font-family: "VT323", ui-monospace, "SFMono-Regular", monospace;
        overscroll-behavior: none;
      }
      body {
        overflow: hidden;
      }
      /* Pixel-art scaling for any decorative imgs we add later */
      img.pixel {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      /* Tame default focus rings to match the theme */
      :focus-visible {
        outline: 2px solid #e8a04a;
        outline-offset: 2px;
      }
      /* Pixel scrollbar (webkit) */
      *::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      *::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.18);
      }
      *::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.3);
      }
      *::-webkit-scrollbar-track {
        background: transparent;
      }
      /* Soft heart-pulse keyframes shared across the UI */
      @keyframes dap-heart-pulse {
        0%,
        100% {
          transform: scale(1);
          filter: drop-shadow(0 0 3px rgba(212, 96, 96, 0.55));
        }
        50% {
          transform: scale(1.12);
          filter: drop-shadow(0 0 8px rgba(212, 96, 96, 0.85));
        }
      }
      .dap-pulse {
        display: inline-block;
        animation: dap-heart-pulse 1.8s ease-in-out infinite;
      }
      /* Torchlight CTA glow — warmer pulse, brighter peak */
      @keyframes dap-cta-glow {
        0%,
        100% {
          filter: drop-shadow(0 0 8px rgba(232, 160, 74, 0.45));
        }
        50% {
          filter: drop-shadow(0 0 16px rgba(232, 160, 74, 0.85));
        }
      }
      .dap-cta {
        animation: dap-cta-glow 2.4s ease-in-out infinite;
      }
      /* Magical cyan rune-flicker for charged/special accents */
      @keyframes dap-rune-flicker {
        0%,
        100% {
          filter: drop-shadow(0 0 4px rgba(93, 208, 230, 0.5));
        }
        50% {
          filter: drop-shadow(0 0 10px rgba(93, 208, 230, 0.9));
        }
      }
      .dap-rune {
        display: inline-block;
        animation: dap-rune-flicker 2.2s ease-in-out infinite;
      }
      /* Translucent panels can use this helper directly */
      .dap-glass {
        background: rgba(26, 18, 12, 0.78);
        -webkit-backdrop-filter: blur(10px) saturate(1.15);
        backdrop-filter: blur(10px) saturate(1.15);
        border: 1px solid rgba(232, 200, 140, 0.22);
      }

      /* Responsive layout classes used by TitleScreen */
      .dap-title-root {
        height: 100%;
        width: 100%;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto auto auto;
        gap: clamp(10px, 2.2vh, 18px);
        padding: clamp(10px, 2.2vh, 14px) clamp(14px, 4vw, 56px) clamp(12px, 2.6vh, 22px);
        box-sizing: border-box;
        overflow: hidden;
      }
      .dap-title-topbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
        gap: 14px;
        align-items: center;
      }
      .dap-title-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.15fr) minmax(260px, 0.85fr);
        gap: clamp(20px, 4vw, 48px);
        align-items: start;
        min-height: 0;
      }
      .dap-challenger-strip {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
      }
      .dap-bottom-tags {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .dap-cta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 18px;
        align-items: center;
      }

      /* Mobile */
      @media (max-width: 720px) {
        .dap-title-root {
          overflow-y: auto;
        }
        .dap-title-topbar {
          grid-template-columns: 1fr;
          justify-items: center;
          text-align: center;
          gap: 8px;
        }
        .dap-title-topbar > * {
          justify-self: center;
        }
        .dap-title-grid {
          grid-template-columns: 1fr;
          gap: 18px;
        }
        .dap-challenger-strip {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
        .dap-cta-row {
          justify-content: center;
          text-align: center;
        }
        .dap-bottom-tags {
          justify-content: center;
          text-align: center;
        }
      }

      /* Narrow phones — drop to 2 cards visible (rest wrap) */
      @media (max-width: 420px) {
        .dap-challenger-strip {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
