<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b0b14" />
    <title>GRIDLORE</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        /* 100% as a fallback for old browsers; dvh = dynamic viewport
           that excludes the iOS Safari URL bar, so the grid stops getting
           cropped at the bottom. */
        height: 100%;
        height: 100dvh;
        background: #0b0b14;
        color: #e9e7d8;
        font-family:
          ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        overscroll-behavior: none;
      }
      body {
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
